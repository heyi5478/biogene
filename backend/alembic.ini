# Alembic configuration for the gimc database.
#
# DATABASE_URL is read from the environment in alembic/env.py — we don't
# hardcode the connection string here so the same migrations work in dev,
# staging, and production without editing config.
#
# Run from `backend/`:
#     alembic upgrade head
#     alembic revision --autogenerate -m "what changed"
#     alembic downgrade -1

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
sqlalchemy.url =
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
