upstream frontend_upstream {
  server frontend:80;
}

upstream gateway_upstream {
  server gateway:8000;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  client_max_body_size 4m;

  # Proxy-level liveness probe — distinct from per-service /healthz so an
  # ops check can confirm "the edge is up" without depending on upstreams.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # API: trailing slash on proxy_pass strips the /api/ prefix so gateway
  # sees its native paths (/healthz, /patients, …).
  location /api/ {
    proxy_pass http://gateway_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else → frontend (which owns SPA fallback + asset caching).
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
