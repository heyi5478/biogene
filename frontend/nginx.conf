server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Liveness/readiness probe — keep cheap and outside access logs.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Vite emits content-hashed filenames under /assets/ — safe to cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache index.html: it's the entry point that pulls in the
  # currently-deployed bundle. Stale index = users on old code.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: unknown paths (React Router routes) all return index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Defence in depth — gzip helps when no upstream proxy already does it.
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/plain
    text/xml
    image/svg+xml;
}
