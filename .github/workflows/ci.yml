name: CI

on:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ./frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend packages
        working-directory: .
        run: |
          pip install -U pip
          pip install -e backend/shared
          pip install -e backend/gateway
          pip install -e backend/svc-patient
          pip install -e backend/svc-lab
          pip install -e backend/svc-disease
      - name: Start backend services
        working-directory: .
        env:
          GATEWAY_CORS_ORIGIN: http://localhost:8080
        run: |
          nohup uvicorn svc_patient.app:app --host 127.0.0.1 --port 8001 > svc-patient.log 2>&1 &
          nohup uvicorn svc_lab.app:app     --host 127.0.0.1 --port 8002 > svc-lab.log 2>&1 &
          nohup uvicorn svc_disease.app:app --host 127.0.0.1 --port 8003 > svc-disease.log 2>&1 &
          nohup uvicorn gateway.app:app     --host 127.0.0.1 --port 8000 > gateway.log 2>&1 &
      - name: Wait for gateway healthz
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/healthz > /dev/null; then
              echo "Gateway up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to start within 60s"
          echo "--- gateway.log ---"; cat gateway.log || true
          echo "--- svc-patient.log ---"; cat svc-patient.log || true
          echo "--- svc-lab.log ---"; cat svc-lab.log || true
          echo "--- svc-disease.log ---"; cat svc-disease.log || true
          exit 1
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          VITE_API_BASE_URL: http://localhost:8000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
